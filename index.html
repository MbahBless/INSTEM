<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var nativeFetch = window.fetch;
          var customFetch = nativeFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var nativeFetchGlobal = globalThis.fetch;
            var customFetchGlobal = nativeFetchGlobal;
            Object.defineProperty(globalThis, 'fetch', {
              get: function() { return customFetchGlobal; },
              set: function(val) { customFetchGlobal = val; },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn("Failed to define fetch property", err);
          }
        }
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
